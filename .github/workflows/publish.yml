name: Publish (manual)

# Manual / fallback path to npm. The primary publish now happens automatically
# as a job in release-please.yml. Use this workflow to:
#   - publish a version that was tagged by hand (`git tag vX.Y.Z && git push origin vX.Y.Z`)
#   - re-run a publish from the Actions UI (workflow_dispatch), e.g. publishing
#     an already-tagged version after first setting the NPM_TOKEN secret.
#
# Idempotent: skips if the version is already on npm. Skips gracefully (green)
# if NPM_TOKEN is not set.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Tag to publish (e.g. v1.0.0)'
        required: true

permissions:
  contents: read
  id-token: write   # required for npm publish --provenance

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Version sync check (package.json vs SKILL.md)
        run: node test/version-sync.js

      - name: Smoke test
        run: node test/smoke.js

      - name: Publish to npm (idempotent, with provenance)
        run: |
          set -euo pipefail
          if [ -z "${NPM_TOKEN:-}" ]; then
            echo "::notice::NPM_TOKEN secret is not set — skipping npm publish. Add it (Settings → Secrets → Actions) to enable publishing."
            exit 0
          fi
          VERSION=$(node -p "require('./package.json').version")
          echo "Releasing zoom-in@$VERSION"
          if npm view "zoom-in@$VERSION" version >/dev/null 2>&1; then
            echo "::notice::zoom-in@$VERSION is already on npm — skipping."
          else
            npm publish --provenance --access public
            echo "::notice::Published zoom-in@$VERSION"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
