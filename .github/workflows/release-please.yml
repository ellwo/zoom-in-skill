name: Release

# release-please maintains a running release PR that bumps the version,
# updates CHANGELOG.md, and bumps skills/zoom-in/SKILL.md to match. When that
# release PR merges (auto-merged once CI passes), release-please creates the
# vX.Y.Z tag and a GitHub Release with the auto-generated changelog.
#
# The `publish` job below then publishes to npm. It MUST live in this same
# workflow (as a job dependency) because GitHub's default GITHUB_TOKEN cannot
# trigger *other* workflows — a separate `on: push: tags` publish workflow
# would never fire for tags created by release-please.
#
# Commits use Conventional Commits for the changelog + version bump:
#   feat: -> minor        fix: -> patch
#   feat!: -> major       docs/chore/refactor/test/ci: -> no release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Version + changelog + tag + GitHub release
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
      version: ${{ steps.rp.outputs.version }}
    steps:
      - id: rp
        uses: googleapis/release-please-action@v4
        # v4 reads package config (release-type, package-name, extra-files,
        # include-component-in-tag) from release-please-config.json — these are
        # NOT `with:` inputs in v4. The config keeps skills/zoom-in/SKILL.md's
        # version in lockstep with package.json via extra-files.
        with:
          config-file: release-please-config.json

  publish:
    name: Publish to npm
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for npm publish --provenance
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Version sync check (package.json vs SKILL.md)
        run: node test/version-sync.js

      - name: Smoke test
        run: node test/smoke.js

      - name: Publish to npm (idempotent, with provenance)
        run: |
          set -euo pipefail
          if [ -z "${NPM_TOKEN:-}" ]; then
            echo "::notice::NPM_TOKEN secret is not set — skipping npm publish. Add it (Settings → Secrets → Actions) to enable automatic publishing."
            exit 0
          fi
          VERSION=$(node -p "require('./package.json').version")
          echo "Releasing zoom-in@$VERSION"
          if npm view "zoom-in@$VERSION" version >/dev/null 2>&1; then
            echo "::notice::zoom-in@$VERSION is already on npm — skipping."
          else
            npm publish --provenance --access public
            echo "::notice::Published zoom-in@$VERSION"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
